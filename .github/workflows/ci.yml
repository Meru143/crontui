name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            go-version: "1.24"
          - os: ubuntu-latest
            go-version: "1.25"
          - os: windows-latest
            go-version: "1.25"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: make build

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: make test

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: go build -o crontui.exe .

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: go test ./... -v

      - name: Windows smoke
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CRONTUI_WINDOWS_TASK_PATH: '\CronTUI-CI\'
          CRONTUI_BACKUP_DIR: ${{ runner.temp }}\crontui-windows-smoke-backups
        run: .\scripts\windows-smoke.ps1 -BinaryPath "$PWD\crontui.exe"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
