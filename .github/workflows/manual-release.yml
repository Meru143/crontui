name: Manual Release Tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version bump to apply to the latest v* tag
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    concurrency:
      group: manual-release-tag
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/heads/master
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        id: tag
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<EOF
          $version
          EOF

          case "$BUMP" in
            patch)
              patch=$((patch + 1))
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            *)
              echo "Unsupported bump type: $BUMP" >&2
              exit 1
              ;;
          esac

          new_tag="v${major}.${minor}.${patch}"
          if git rev-parse "$new_tag" >/dev/null 2>&1; then
            echo "Tag already exists: $new_tag" >&2
            exit 1
          fi

          git tag -a "$new_tag" -m "Release $new_tag"
          git push origin "$new_tag"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Write summary
        run: |
          echo "Created tag ${{ steps.tag.outputs.new_tag }} from refs/heads/master." >> "$GITHUB_STEP_SUMMARY"
