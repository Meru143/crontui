# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: crontui
    main: .
    binary: crontui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/meru143/crontui/internal/version.Version={{.Version}}
      - -X github.com/meru143/crontui/internal/version.Commit={{.ShortCommit}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: meru143
      name: homebrew-tap
    homepage: "https://github.com/meru143/crontui"
    description: "Terminal UI for managing cron jobs"
    license: "MIT"
    install: |
      bin.install "crontui"
    test: |
      system "#{bin}/crontui", "version"
